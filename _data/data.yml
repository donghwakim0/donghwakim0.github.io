career-profile:
  title: About Me
  summary: |
    I am a Ph.D. student in the integrated M.S./Ph.D. program at [**KAIST AI**](https://gsai.kaist.ac.kr/?lang=en), working in the Optimization & Machine Learning Laboratory (OptiML) under the supervision of [**Prof. Chulhee Yun**](https://chulheeyun.github.io/).
    My research focuses on optimization theory, particularly the theoretical understanding of optimization algorithms and their convergence behavior.
    I received my B.S. in [**Mathematical Sciences**](https://mathsci.kaist.ac.kr/home/en/) at KAIST.

